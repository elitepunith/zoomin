<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoomin</title>
    
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.18/dist/lenis.css" />
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
  </head>
  <body>
    <main>
      <section class="hero-section section" id="section-00">
        <div class="hero-image-wrapper">
          <img src="./images/sky.png" class="sky" alt="" />
          <img src="./images/mountains.png" class="mountains" alt="" />
          <img src="./images/man-standing.png" class="man-standing" alt="" />
        </div>

        <div class="hero-content">
          <h5 class="hero-subtitle">Mother Nature</h5>
          <h1 class="hero-title">
            <span>From soaring peaks to</span><br/>
            <span>the deepest abysses!</span>
          </h1>
          <a href="#quote-section" class="hero-action">
            Explore world 
            <svg width="16" height="24" viewBox="0 0 16 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M16 16L14.59 14.59L9 20.17V0H7V20.17L1.42 14.58L0 16L8 24L16 16Z" fill="currentColor"></path>
            </svg>
          </a>
        </div>
      </section>

      <section id="quote-section" style="min-height: 50vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 100px 24px; position: relative; z-index: 5;">
        <h2 class="quote-text" style="font-family: 'Bentham', serif; font-size: clamp(24px, 4vw, 40px); color: #fff; max-width: 800px; line-height: 1.5; font-style: italic;">
          "Look deep into nature, and then you will understand everything better."
          <span style="font-size: 18px; color: #fbd784; font-family: 'Roboto', sans-serif; display: block; margin-top: 30px; font-style: normal; letter-spacing: 2px; text-transform: uppercase;">- Albert Einstein</span>
        </h2>
      </section>

      <nav class="slider">
        <div class="container">
          <ul class="slider-list">
            <li class="slider-list-item">
              <a href="#section-00">Start</a>
            </li>
            <li class="slider-list-item">
              <a href="#quote-section">Quote</a>
            </li>
          </ul>
          <div class="slider-progress">
            <div class="slider-progress-bar" style="height: 50%;"></div>
          </div>
        </div>
      </nav>
    </main>

    <footer>
      <div class="container">
      </div>
    </footer>

    <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollToPlugin.min.js"></script>
    <script src="./js/script.js"></script>
  </body>
</html>
